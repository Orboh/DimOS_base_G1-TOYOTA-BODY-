# Convenience wrapper for the Go2 agentic container.
#
#   cd dimensional-applications
#   docker compose -f docker/docker-compose.yml up --build
#
# Send NL commands (in another terminal):
#   docker compose -f docker/docker-compose.yml exec go2 dimos agent-send "前に進んで"

services:
  go2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: go2-agentic:latest
    # --network host is required so the container can:
    #   - reach the Go2 at 192.168.123.x (no NAT)
    #   - run WebRTC (avoids ICE issues that hit when behind a bridge)
    #   - share the host's loopback for dimos LCM multicast
    network_mode: host
    # Multicast/route setup needs NET_ADMIN; safest minimal cap set.
    cap_add:
      - NET_ADMIN
    env_file:
      - ../.env
    stdin_open: true
    tty: true
    # Default command is `dimos run unitree-go2-agentic` (from Dockerfile CMD).
    # Override here for `say_robot.py` (lightweight path) or interactive shell:
    #   command: ["python", "say_robot.py"]
    #   command: ["bash"]
